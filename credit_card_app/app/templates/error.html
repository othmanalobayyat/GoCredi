<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error | GoCredi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}" />
  </head>

  <body>

    <nav class="navbar">
      <div class="logo">
        <img src="{{ url_for('static', filename='img/logo-white.png') }}" alt="GoCredi Logo" />
        <span style="font-weight: bold; color: #fff; font-size: 22px">GoCredi</span>
      </div>
      <input type="checkbox" id="nav-toggle" class="nav-toggle-cb" />
      <label for="nav-toggle" class="nav-toggle-btn"><i class="fas fa-bars"></i></label>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About CrediCard</a></li>
        <li><a href="/aboutus">About Us</a></li>
        <li><a href="/contact">Contact Us</a></li>
      </ul>
    </nav>

    <div class="error-page">
      <div class="error-icon"><i class="fas fa-triangle-exclamation"></i></div>
      <h1 class="error-title">Something went wrong</h1>
      <p class="error-message">{{ message }}</p>
      <a href="/" class="start-btn">Go Back Home</a>
    </div>

    <footer class="site-footer">
      <span>GoCredi &copy; 2025 &nbsp;&middot;&nbsp; Palestine Ahliya University</span>
    </footer>

  </body>
</html>
