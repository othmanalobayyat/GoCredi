<!-- 🔺 Currency Ticker -->

      USD/ILS: <span id="usd-ils">—</span>
    </span>

        src="{{ url_for('static', filename='img/flags/eu.svg') }}"

        alt="EUR flag"
      />

    </span>

    <span class="pair gbp" onclick="showCurrencyModal('GBP/ILS')">
      <img
        src="{{ url_for('static', filename='img/flags/gb.svg') }}"
        class="flag-icon"
        alt="GBP flag"
      />
      GBP/ILS: <span id="gbp-ils">—</span>
    </span>

    <span class="pair jod" onclick="showCurrencyModal('JOD/ILS')">
      <img
        src="{{ url_for('static', filename='img/flags/jo.svg') }}"
        class="flag-icon"
        alt="JOD flag"
      />
      JOD/ILS: <span id="jod-ils">—</span>
    </span>

    <span class="pair aed" onclick="showCurrencyModal('AED/ILS')">
      <img
        src="{{ url_for('static', filename='img/flags/ae.svg') }}"
        class="flag-icon"
        alt="AED flag"
      />
      AED/ILS: <span id="aed-ils">—</span>
    </span>

    <span class="pair sar" onclick="showCurrencyModal('SAR/ILS')">
      <img
        src="{{ url_for('static', filename='img/flags/sa.svg') }}"
        class="flag-icon"
        alt="SAR flag"
      />
      SAR/ILS: <span id="sar-ils">—</span>
    </span>

    <span class="pair try" onclick="showCurrencyModal('TRY/ILS')">
      <img
        src="{{ url_for('static', filename='img/flags/tr.svg') }}"
        class="flag-icon"
        alt="TRY flag"
      />
      TRY/ILS: <span id="try-ils">—</span>
    </span>

    <span class="pair kwd" onclick="showCurrencyModal('KWD/ILS')">
      <img
        src="{{ url_for('static', filename='img/flags/kw.svg') }}"
        class="flag-icon"
        alt="KWD flag"
      />
      KWD/ILS: <span id="kwd-ils">—</span>
    </span>

    <span class="pair egp" onclick="showCurrencyModal('EGP/ILS')">

      />
      EGP/ILS: <span id="egp-ils">—</span>
    </span>
  </div>
</div>

<!-- 💬 Currency Modal -->
<div id="currencyModal" class="modal">
  <div class="currency-modal-content">
    <button
      class="currency-modal-close"
      onclick="closeCurrencyModal()"
      aria-label="Close modal"
    >
      &times;
    </button>

    <div class="currency-modal-header">
      <div class="currency-modal-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <div>
        <p class="currency-modal-label">Exchange Details</p>
        <h3 id="modal-title">Currency Pair</h3>
      </div>
    </div>

    <div class="currency-stats">
      <div class="currency-stat-card">
        <div class="currency-stat-top">
          <i class="fas fa-coins"></i>
          <span>Live Rate</span>
        </div>
        <strong id="modal-current">—</strong>
      </div>

      <div class="currency-stat-card">
        <div class="currency-stat-top">
          <i class="fas fa-arrow-trend-up"></i>
          <span>24h High</span>
        </div>
        <strong id="modal-high">—</strong>
      </div>

      <div class="currency-stat-card">
        <div class="currency-stat-top">
          <i class="fas fa-arrow-trend-down"></i>
          <span>24h Low</span>
        </div>
        <strong id="modal-low">—</strong>
      </div>
    </div>
  </div>
</div>
<script>
  let latestRates = {};

  function fetchRates() {
    fetch("https://open.er-api.com/v6/latest/ILS")
      .then((res) => res.json())
      .then((data) => {
        const rates = data.rates;

        latestRates = {
          "USD/ILS": 1 / rates.USD,
          "EUR/ILS": 1 / rates.EUR,
          "GBP/ILS": 1 / rates.GBP,
          "JOD/ILS": 1 / rates.JOD,
          "AED/ILS": 1 / rates.AED,
          "SAR/ILS": 1 / rates.SAR,
          "TRY/ILS": 1 / rates.TRY,
          "KWD/ILS": 1 / rates.KWD,
          "EGP/ILS": 1 / rates.EGP,
        };

        for (const key in latestRates) {
          const elId = key.split("/")[0].toLowerCase() + "-ils";
          const el = document.getElementById(elId);
          if (el) {
            el.textContent = latestRates[key].toFixed(2);
          }
        }
      })
      .catch((error) => {
        console.error("Failed to fetch currency rates:", error);
      });
  }

  function showCurrencyModal(pair) {
    const current = latestRates[pair];
    if (!current) return;

    document.getElementById("modal-title").textContent = pair;
    document.getElementById("modal-current").textContent = current.toFixed(2);
    document.getElementById("modal-high").textContent = (
      current + 0.05
    ).toFixed(2);
    document.getElementById("modal-low").textContent = (current - 0.05).toFixed(
      2,
    );
    document.getElementById("currencyModal").style.display = "block";
  }

  function closeCurrencyModal() {
    document.getElementById("currencyModal").style.display = "none";
  }

  window.onclick = function (event) {
    const modal = document.getElementById("currencyModal");
    if (event.target === modal) {
      modal.style.display = "none";
    }
  };

  fetchRates();
  setInterval(fetchRates, 60000);
</script>
