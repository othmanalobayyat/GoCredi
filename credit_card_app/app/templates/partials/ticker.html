<script>
  let latestRates = {};
  function fetchRates() {
    fetch('https://open.er-api.com/v6/latest/ILS')
      .then(res => res.json())
      .then(data => {
        const rates = data.rates;
        latestRates = {
          'USD/ILS': 1 / rates.USD,
          'EUR/ILS': 1 / rates.EUR,
          'GBP/ILS': 1 / rates.GBP,
          'JOD/ILS': 1 / rates.JOD,
          'AED/ILS': 1 / rates.AED,
          'SAR/ILS': 1 / rates.SAR,
          'TRY/ILS': 1 / rates.TRY,
          'KWD/ILS': 1 / rates.KWD,
          'EGP/ILS': 1 / rates.EGP
        };
        for (const key in latestRates) {
          const elId = key.split('/')[0].toLowerCase() + "-ils";
          const el = document.getElementById(elId);
          if (el) el.textContent = latestRates[key].toFixed(2);
        }
      });
  }
  fetchRates();
  setInterval(fetchRates, 60000);

  function showCurrencyModal(pair) {
    const current = latestRates[pair];
    document.getElementById('modal-title').textContent = pair;
    document.getElementById('modal-current').textContent = current.toFixed(2);
    document.getElementById('modal-high').textContent = (current + 0.05).toFixed(2);
    document.getElementById('modal-low').textContent = (current - 0.05).toFixed(2);
    document.getElementById('currencyModal').style.display = 'block';
  }
  function closeCurrencyModal() {
    document.getElementById('currencyModal').style.display = 'none';
  }
  window.onclick = function (event) {
    const modal = document.getElementById('currencyModal');
    if (event.target == modal) modal.style.display = 'none';
  }
</script>

<!-- 💬 Modal -->
<div id="currencyModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeCurrencyModal()">&times;</span>
    <h3 id="modal-title">Currency Detail</h3>
    <p><strong>Live Rate:</strong> <span id="modal-current">—</span> 💰</p>
    <p><strong>24h High:</strong> <span id="modal-high">—</span> 📈</p>
    <p><strong>24h Low:</strong> <span id="modal-low">—</span> 📉</p>
  </div>
</div>
