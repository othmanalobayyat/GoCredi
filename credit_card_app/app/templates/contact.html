{% extends "base.html" %} {% block title %}Contact Us | GoCredi{% endblock %} {%
block content %}
<div class="page-header">
  <p class="page-label">SUPPORT</p>
  <h1 class="page-title">Contact Us</h1>
  <p class="page-sub">Send us a message and we will get back to you.</p>
</div>

<div class="contact-wrap">
  <div class="content-card contact-card">
    <form id="contact-form">
      <div class="form-group">
        <label class="field-label" for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Your full name"
          required
        />
      </div>

      <div class="form-group">
        <label class="field-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label class="field-label" for="message">Message</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Write your message here..."
          required
        ></textarea>
      </div>

      <div class="contact-submit">
        <button type="submit" class="start-btn contact-submit-btn">
          <i class="fas fa-paper-plane"></i> Send Message
        </button>
      </div>
    </form>

    <div
      id="contact-feedback"
      class="contact-feedback"
      aria-live="polite"
    ></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  emailjs.init("64_lhVy0p5zuSjMcW");

  document
    .getElementById("contact-form")
    .addEventListener("submit", function (e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector(".contact-submit-btn");
      const feedback = document.getElementById("contact-feedback");

      feedback.className = "contact-feedback";
      feedback.textContent = "";

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

      emailjs
        .sendForm("service_ia7hq1q", "template_hs99e9f", form)
        .then(function () {
          feedback.className = "contact-feedback contact-feedback--success";
          feedback.textContent =
            "Your message was sent successfully. We\u2019ll get back to you soon.";
          form.reset();
        })
        .catch(function (err) {
          feedback.className = "contact-feedback contact-feedback--error";
          feedback.textContent =
            "Something went wrong. Please try again or contact us directly.";
          console.error("EmailJS error:", err);
        })
        .finally(function () {
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Message';
        });
    });
</script>
{% endblock %}
